services:
  redis:
    image: redis:alpine
    container_name: campride_redis
    ports:
      - "6380:6379"

  postgres:
    image: postgis/postgis:15-3.3
    container_name: campride_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: shuttledb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-user-db.sql:/docker-entrypoint-initdb.d/init-user-db.sql

volumes:
  postgres_data: